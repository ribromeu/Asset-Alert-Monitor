# ──────────────────────────────────────────────────────────────────
# .github/workflows/asset_alert.yml
#
# WHAT IT DOES: runs the alert monitor on a schedule and on demand.
# Sends email only when alerts are triggered (default behavior).
#
# SECRETS REQUIRED (Settings → Secrets → Actions):
#   GMAIL_USER      — your Gmail address
#   GMAIL_APP_PASS  — 16-char App Password from myaccount.google.com/apppasswords
#   ALERT_TO        — recipient email (comma-separated for multiple)
# ──────────────────────────────────────────────────────────────────

name: Asset Alert Monitor

on:
  schedule:
    # runs at 16:30 UTC = 12:30 PM ET (30 min after NYSE close)
    - cron: "30 16 * * 1-5"

    # optional: pre-market check at 13:00 UTC = 9:00 AM ET
    # - cron: "0 13 * * 1-5"

  workflow_dispatch:
    inputs:
      force_send:
        description: "Send email even if no alerts triggered"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      dry_run:
        description: "Dry run — build email but do not send"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  run-alerts:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run alert monitor
        env:
          GMAIL_USER:     ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          ALERT_TO:       ${{ secrets.ALERT_TO }}
        run: |
          FLAGS=""
          if [ "${{ github.event.inputs.force_send }}" = "true" ]; then
            FLAGS="$FLAGS --force-send"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAGS="$FLAGS --dry-run"
          fi
          python main.py $FLAGS

      - name: Upload dry-run preview (if dry run)
        if: github.event.inputs.dry_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: email-preview
          path: /tmp/alert_preview.html
          retention-days: 1
